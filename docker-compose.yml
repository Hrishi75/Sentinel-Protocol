version: "3.8"

services:
  # ============================================
  # Solana Program — Build, Deploy, Test
  # ============================================
  solana:
    build:
      context: .
      dockerfile: docker/solana/Dockerfile
    container_name: sentinel-solana
    environment:
      - SOLANA_CLUSTER=devnet
      - RUN_TESTS=false
    volumes:
      # Persist wallet keypair between runs
      - wallet-data:/warden/wallet
      # Share IDL with frontend
      - shared-data:/warden/shared
      # Persist build cache
      - cargo-cache:/root/.cargo/registry
      - target-cache:/warden/target
    profiles:
      - deploy
      - full

  # ============================================
  # Next.js Frontend
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_SOLANA_NETWORK=devnet
        - NEXT_PUBLIC_RPC_ENDPOINT=https://api.devnet.solana.com
    container_name: sentinel-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - app
      - full

  # ============================================
  # Dev mode — Frontend with hot reload
  # ============================================
  dev:
    image: node:20-alpine
    container_name: sentinel-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
      - dev-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SOLANA_NETWORK=devnet
      - NEXT_PUBLIC_RPC_ENDPOINT=https://api.devnet.solana.com
    profiles:
      - dev

volumes:
  wallet-data:
  shared-data:
  cargo-cache:
  target-cache:
  dev-node-modules: